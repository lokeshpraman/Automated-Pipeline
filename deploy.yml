---
- name: Dockerized Server Setup and Deployment
  hosts: webservers
  become: yes

  tasks:
    - name: Step 1 - Ensure Docker is installed
      dnf:
        name: docker
        state: present

    - name: Step 2 - Start and enable the Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Step 3 - Copy your application files to the cloud server
      copy:
        src: "{{ item }}"
        dest: /home/ec2-user/
      loop:
        - app.py
        - Dockerfile

    - name: Step 4 - Build the Docker Image
      shell: docker build -t my-flask-app /home/ec2-user/

    - name: Step 5 - Assassinate the old container (if it exists)
      shell: docker rm -f my-flask-container || true

    - name: Step 6 - Run the new Docker Container
      shell: docker run -d --name my-flask-container -p 5001:5001 my-flask-app