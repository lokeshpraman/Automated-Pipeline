---
- name: Containerized Server Setup and Deployment (Podman)
  hosts: webservers
  become: yes

  tasks:
    - name: Step 1 - Install Podman (The modern container engine)
      dnf:
        name: podman
        state: present

    - name: Step 2 - Copy your application files to the cloud server
      copy:
        src: "{{ item }}"
        dest: /home/ec2-user/
      loop:
        - app.py
        - Dockerfile

    - name: Step 3 - Build the Container Image
      shell: podman build -t my-flask-app /home/ec2-user/

    - name: Step 4 - Assassinate the old container (if it exists)
      shell: podman rm -f my-flask-container || true

    - name: Step 5 - Run the new Container
      shell: podman run -d --name my-flask-container -p 5001:5001 my-flask-app